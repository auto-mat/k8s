#@ load("@ytt:data", "data")

#@ config_vars = [
#@     "PHP_MEMORY_LIMIT",
#@ ]
#@ secret_vars = [
#@    "MATOMO_DATABASE_HOST",
#@    "MATOMO_DATABASE_TABLES_PREFIX",
#@    "MATOMO_DATABASE_USERNAME",
#@    "MATOMO_DATABASE_PASSWORD",
#@    "MATOMO_DATABASE_DBNAME",
#@ ]

#@ port = 80

#@ def matomo(app_name, image, config_map, secret_map):
apiVersion: v1
items:
  - apiVersion: v1
    kind: Service
    metadata:
      name: #@ app_name
    spec:
      ports:
        - name: "80"
          port: #@ port
          targetPort: #@ port
      selector:
        app: #@ app_name
    status:
      loadBalancer: {}
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: #@ app_name
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: #@ app_name
      template:
        metadata:
          labels:
            app: #@ app_name
        spec:
          containers:
            - image: #@ image
              name: #@ app_name
              ports:
                - containerPort: #@ port
              resources: {}
              volumeMounts:
                - mountPath: /var/www/html/
                  name: #@ app_name + "-data"
              env:
                #@ for var in config_vars:
                - name: #@ var
                  valueFrom:
                    configMapKeyRef:
                      key: #@ var
                      name: #@ config_map
                #@ end
                #@ for var in secret_vars:
                - name: #@ var
                  valueFrom:
                    secretKeyRef:
                      key: #@ var
                      name: #@ secret_map
                #@ end
          volumes:
            - name: #@ app_name + "-data"
              persistentVolumeClaim:
                claimName: #@ app_name + "-pv-claim"
          securityContext:
            fsGroup: 33

  - apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: #@ app_name + "-pv-volume"
    spec:
      capacity:
        storage: 1Gi
      accessModes:
        - ReadWriteMany
      storageClassName: "nfs"
      mountOptions:
        - hard
        - nfsvers=4.2
      nfs:
        path: #@ "/{}-data".format(app_name)
        server: #@ data.values.nfsServer.clusterIP

  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: #@ app_name + "-pv-claim"
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 1Gi
      storageClassName: "nfs"
    status: {}

kind: List
metadata: {}
#@ end
