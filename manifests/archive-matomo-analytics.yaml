apiVersion: batch/v1
kind: CronJob
metadata:
  name: archive-matomo-analytics
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: archive-matomo-analytics
            image: matomo:5.8-apache
            imagePullPolicy: IfNotPresent
            command: ["/bin/bash"]
            args: ["-c", "/entrypoint.sh; /usr/local/bin/php /var/www/html/console core:archive --url=https://matomo.dopracenakole.cz/"]
            volumeMounts:
              - mountPath: /var/www/html/
                name: matomo-data
            env:
            - name: MATOMO_DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: matomo-access
                  key: MATOMO_DATABASE_HOST
            - name: MATOMO_DATABASE_TABLES_PREFIX
              valueFrom:
                secretKeyRef:
                  name: matomo-access
                  key: MATOMO_DATABASE_TABLES_PREFIX
            - name: MATOMO_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: matomo-access
                  key: MATOMO_DATABASE_USERNAME
            - name: MATOMO_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: matomo-access
                  key: MATOMO_DATABASE_PASSWORD
            - name: MATOMO_DATABASE_DBNAME
              valueFrom:
                secretKeyRef:
                  name: matomo-access
                  key: MATOMO_DATABASE_DBNAME
          volumes:
            - name: matomo-data
              persistentVolumeClaim:
                claimName: matomo-pv-claim
          securityContext:
            fsGroup: 33
          restartPolicy: Never
